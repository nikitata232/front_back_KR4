global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:8080
    default_backend http_back

backend http_back
    balance roundrobin
    option  httpchk GET /health
    server server1 127.0.0.1:3000 check inter 5s fall 2 rise 3
    server server2 127.0.0.1:3001 check inter 5s fall 2 rise 3
    server server3 127.0.0.1:3002 backup   check inter 5s fall 2 rise 3

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
