events {
    worker_connections 1024;
}

http {
    upstream backend {
        # Round Robin (по умолчанию) — запросы распределяются по кругу
        server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;  # Сервер 1
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;  # Сервер 2
        server 127.0.0.1:3002 backup;                         # Резервный сервер
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://backend;
        }
    }
}
