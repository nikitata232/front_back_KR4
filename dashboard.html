<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PhoneStore — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 18px; color: #fff; margin-bottom: 24px; }
    h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }

    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    button {
      padding: 8px 16px; border: none; border-radius: 6px;
      cursor: pointer; font-family: monospace; font-size: 13px; font-weight: bold;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:hover  { background: #b91c1c; }
    .btn-green   { background: #16a34a; color: #fff; }
    .btn-green:hover   { background: #15803d; }

    .log { list-style: none; max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .log li {
      padding: 6px 10px; border-radius: 4px; font-size: 12px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .log .time { color: #555; white-space: nowrap; }
    .log .info { flex: 1; }

    .tag {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap;
    }
    .tag-1      { background: #1e3a8a; color: #93c5fd; }
    .tag-2      { background: #3b1f6e; color: #c4b5fd; }
    .tag-3      { background: #1a3a2a; color: #6ee7b7; }
    .tag-db     { background: #422006; color: #fbbf24; }
    .tag-cache  { background: #14532d; color: #4ade80; }
    .tag-err    { background: #450a0a; color: #f87171; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; text-align: center; }
    .stat .val { font-size: 28px; font-weight: bold; color: #fff; }
    .stat .lbl { font-size: 11px; color: #555; margin-top: 4px; }
    .stat.s1 .val { color: #93c5fd; }
    .stat.s2 .val { color: #c4b5fd; }
    .stat.db .val  { color: #fbbf24; }
    .stat.cch .val { color: #4ade80; }

    .redis-keys { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .redis-key { background: #111; border: 1px solid #222; border-radius: 4px; padding: 8px 12px; font-size: 12px; }
    .redis-key .key { color: #fbbf24; }
    .redis-key .ttl { color: #4ade80; float: right; }
    .redis-key .empty { color: #444; font-style: italic; }

    .auto-label { font-size: 12px; color: #555; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; }
    .dot.active { background: #4ade80; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    hr { border: none; border-top: 1px solid #222; margin: 4px 0 12px; }
  </style>
</head>
<body>

<h1>PhoneStore — Nginx Balancer + Redis Cache Dashboard</h1>

<div class="controls">
  <button class="btn-primary" onclick="sendRequest()">Отправить 1 запрос</button>
  <button class="btn-green"   onclick="sendBatch(10)">Отправить 10 запросов</button>
  <button class="btn-danger"  onclick="flushRedis()">Сбросить кэш Redis</button>
  <label class="auto-label">
    <input type="checkbox" id="autoCheck" onchange="toggleAuto()">
    Авто-режим (каждую секунду)
    <span class="dot" id="autoDot"></span>
  </label>
</div>

<div class="stats">
  <div class="stat s1"><div class="val" id="cnt1">0</div><div class="lbl">Backend-1</div></div>
  <div class="stat s2"><div class="val" id="cnt2">0</div><div class="lbl">Backend-2</div></div>
  <div class="stat"   ><div class="val" id="cnt3">0</div><div class="lbl">Backend-3 (backup)</div></div>
  <div class="stat db" ><div class="val" id="cntDb">0</div><div class="lbl">Запросов в PostgreSQL</div></div>
  <div class="stat cch"><div class="val" id="cntCache">0</div><div class="lbl">Из кэша Redis</div></div>
  <div class="stat"   ><div class="val" id="cntTotal">0</div><div class="lbl">Всего запросов</div></div>
</div>

<div class="grid">
  <div class="card">
    <h2>Nginx — балансировка (:8022)</h2>
    <hr>
    <ul class="log" id="nginxLog"></ul>
  </div>
  <div class="card">
    <h2>Redis — кэширование (:3021)</h2>
    <hr>
    <ul class="log" id="redisLog"></ul>
  </div>
</div>

<div class="card">
  <h2>Ключи в Redis</h2>
  <hr>
  <ul class="redis-keys" id="redisKeys"><li class="redis-key"><span class="empty">нет ключей</span></li></ul>
</div>

<script>
  const counts = { '1': 0, '2': 0, '3': 0, db: 0, cache: 0, total: 0 };
  let autoTimer = null;

  function now() {
    return new Date().toLocaleTimeString('ru', { hour12: false });
  }

  function addLog(listId, html) {
    const ul = document.getElementById(listId);
    const li = document.createElement('li');
    li.innerHTML = html;
    ul.prepend(li);
    while (ul.children.length > 50) ul.removeChild(ul.lastChild);
  }

  function updateStats() {
    document.getElementById('cnt1').textContent     = counts['1'];
    document.getElementById('cnt2').textContent     = counts['2'];
    document.getElementById('cnt3').textContent     = counts['3'];
    document.getElementById('cntDb').textContent    = counts.db;
    document.getElementById('cntCache').textContent = counts.cache;
    document.getElementById('cntTotal').textContent = counts.total;
  }

  async function sendRequest() {
    counts.total++;
    updateStats();

    // Nginx балансировка
    try {
      const r = await fetch('http://localhost:8022/health');
      const d = await r.json();
      const sid = d.server || '?';
      counts[sid] = (counts[sid] || 0) + 1;
      updateStats();
      addLog('nginxLog', `
        <span class="time">${now()}</span>
        <span class="info">/health → <b>backend-${sid}</b> — ${d.db}, ${d.redis}</span>
        <span class="tag tag-${sid}">server-${sid}</span>
      `);
    } catch(e) {
      addLog('nginxLog', `<span class="time">${now()}</span><span class="info">Ошибка: ${e.message}</span><span class="tag tag-err">ERR</span>`);
    }

    // Redis кэш
    try {
      const r = await fetch('http://localhost:3021/api/products');
      const d = await r.json();
      const src = d.source;
      counts[src] = (counts[src] || 0) + 1;
      updateStats();
      addLog('redisLog', `
        <span class="time">${now()}</span>
        <span class="info">/api/products — ${d.data?.length ?? '?'} товаров</span>
        <span class="tag tag-${src}">${src === 'cache' ? '⚡ cache' : '🗄 db'}</span>
      `);
    } catch(e) {
      addLog('redisLog', `<span class="time">${now()}</span><span class="info">Ошибка: ${e.message}</span><span class="tag tag-err">ERR</span>`);
    }

    await refreshRedisKeys();
  }

  async function sendBatch(n) {
    for (let i = 0; i < n; i++) {
      await sendRequest();
      await new Promise(r => setTimeout(r, 150));
    }
  }

  async function flushRedis() {
    try {
      await fetch('http://localhost:3021/dev/flush', { method: 'POST' });
    } catch {}
    counts.db = 0; counts.cache = 0;
    updateStats();
    addLog('redisLog', `<span class="time">${now()}</span><span class="info" style="color:#f87171">Кэш сброшен — следующий запрос пойдёт в БД</span>`);
    await refreshRedisKeys();
  }

  async function refreshRedisKeys() {
    try {
      const r = await fetch('http://localhost:3021/dev/redis-keys');
      const keys = await r.json();
      const ul = document.getElementById('redisKeys');
      if (!keys.length) {
        ul.innerHTML = '<li class="redis-key"><span class="empty">нет ключей — следующий запрос пойдёт в PostgreSQL</span></li>';
        return;
      }
      ul.innerHTML = keys.map(k =>
        `<li class="redis-key"><span class="key">${k.key}</span><span class="ttl">TTL: ${k.ttl}с</span></li>`
      ).join('');
    } catch {
      document.getElementById('redisKeys').innerHTML =
        '<li class="redis-key"><span class="empty">Нет доступа к /dev/redis-keys — добавьте эндпоинт в practice_21</span></li>';
    }
  }

  function toggleAuto() {
    const dot = document.getElementById('autoDot');
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      dot.classList.remove('active');
    } else {
      autoTimer = setInterval(sendRequest, 1000);
      dot.classList.add('active');
    }
  }

  refreshRedisKeys();
</script>
</body>
</html>
